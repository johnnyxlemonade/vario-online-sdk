name: PHPStan Static Analysis

on:
  push:
    branches: [ main, master ]
    paths:
      - 'src/**'
      - 'composer.json'
      - 'composer.lock'
      - 'phpstan.neon.dist'
      - '.github/workflows/**'

  pull_request:
    paths:
      - 'src/**'
      - 'composer.json'
      - 'composer.lock'
      - 'phpstan.neon.dist'

  workflow_dispatch:

concurrency:
  group: phpstan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  phpstan:
    name: PHPStan (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.5', '8.4', '8.3', '8.2', '8.1']

    steps:
      - uses: actions/checkout@v4

      - name: Validate repository structure
        run: |
          set -euo pipefail
          if [ ! -f composer.json ]; then
            echo "::error::composer.json is missing. Repository is in invalid state."
            exit 1
          fi

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2
          extensions: json

      - run: composer validate --strict

      - id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-${{ runner.os }}-${{ matrix.php }}-${{ hashFiles('**/composer.lock') }}
          restore-keys: composer-${{ runner.os }}-${{ matrix.php }}-

      - run: composer install --no-interaction --prefer-dist --no-progress --no-scripts

      - name: Run PHPStan
        run: composer stan:ci
